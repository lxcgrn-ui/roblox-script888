<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HVXZ Script Hub V2 - Fixed</title>
    <style>
        :root {
            /* 默認深色主題 */
            --bg-color: #050505;
            --panel-bg: rgba(20, 20, 20, 0.8);
            --text-color: #ffffff;
            --accent-glow: rgba(0, 255, 204, 0.5);
            --button-bg: #00ffcc;
            --button-text: #000000;
            --cursor-color: rgba(0, 255, 204, 0.25);
            --border-color: rgba(0, 255, 204, 0.3);
        }

        [data-theme="light"] {
            /* 淺色主題 */
            --bg-color: #ffffff;
            --panel-bg: rgba(245, 245, 245, 0.85);
            --text-color: #1a1a1a;
            --accent-glow: rgba(0, 123, 255, 0.4);
            --button-bg: #007bff;
            --button-text: #ffffff;
            --cursor-color: rgba(0, 123, 255, 0.2);
            --border-color: rgba(0, 123, 255, 0.2);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* 延遲跟隨暈光 */
        #cursor-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--cursor-color) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            transform: translate(-50%, -50%);
            will-change: left, top;
        }

        /* 粒子背景 */
        #particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.3;
        }

        /* 右上角切換器 */
        #theme-toggle {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 100;
            background: var(--panel-bg);
            border: 2px solid var(--border-color);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px var(--accent-glow);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #theme-toggle:hover { transform: scale(1.1) rotate(15deg); }

        .icon { width: 28px; height: 28px; fill: var(--text-color); }

        /* 玻璃面板 */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            box-shadow: 0 0 35px var(--accent-glow);
            padding: 50px;
            text-align: center;
            z-index: 10;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .floating { animation: smoothFloat 6s ease-in-out infinite; }
        @keyframes smoothFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* 登入區 */
        #login-container { width: 420px; }
        #login-container h2 { font-size: 2rem; margin-bottom: 25px; letter-spacing: 2px; }

        input[type="password"] {
            width: 85%;
            padding: 15px;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: rgba(128, 128, 128, 0.1);
            color: var(--text-color);
            text-align: center;
            font-size: 1.2rem;
            outline: none;
        }

        .btn {
            padding: 12px 40px;
            border: none;
            border-radius: 12px;
            background: var(--button-bg);
            color: var(--button-text);
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px var(--accent-glow);
            transition: 0.3s;
        }

        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px var(--accent-glow); }

        /* 主選單排成一列 */
        #main-container {
            display: none;
            opacity: 0;
            flex-direction: row;
            gap: 25px;
            width: 95%;
            justify-content: center;
        }

        .script-card {
            flex: 1;
            min-width: 260px;
            max-width: 320px;
            height: 240px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .script-card h3 { font-size: 1.5rem; margin-bottom: 30px; }

        .delay-1 { animation-delay: 0s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.8s; }
        .delay-4 { animation-delay: 1.2s; }

    </style>
</head>
<body data-theme="dark">

    <div id="cursor-glow"></div>
    <canvas id="particles-canvas"></canvas>

    <div id="theme-toggle" onclick="toggleTheme()">
        <svg id="theme-icon" class="icon" viewBox="0 0 24 24">
            <path id="icon-path" d="M12.1,22c-4.9,0-9-4.1-9-9s4.1-9,9-9c0.5,0,1,0.1,1.5,0.2c-2,1.2-3.3,3.3-3.3,5.8c0,3.7,3,6.7,6.7,6.7c2.5,0,4.6-1.3,5.8-3.3C22.9,14,23,14.5,23,15C23,19.9,18.9,24,14,24L12.1,22z"/>
        </svg>
    </div>

    <div id="login-container" class="glass-panel floating">
        <h2>HUB ACCESS</h2>
        <input type="password" id="key-input" placeholder="Enter Key...">
        <br>
        <button class="btn" onclick="checkKey()">LOGIN</button>
    </div>

    <div id="main-container">
        <div class="glass-panel floating script-card delay-1">
            <h3>voidware</h3>
            <button class="btn" onclick="copyCode('loadstring(game:HttpGet(\'https://raw.githubusercontent.com/VapeVoidware/VW-Add/main/nightsintheforest.lua\', true))()', this)">Copy</button>
        </div>
        <div class="glass-panel floating script-card delay-2">
            <h3>rivals</h3>
            <button class="btn" onclick="copyCode('loadstring(game:HttpGet(\'https://raw.githubusercontent.com/akkteste2026-boop/lua/refs/heads/main/NEW%20UPDATE\'))()', this)">Copy</button>
        </div>
        <div class="glass-panel floating script-card delay-3">
            <h3>infinite yied 6.4</h3>
            <button class="btn" onclick="copyCode('loadstring(game:HttpGet(\'https://raw.githubusercontent.com/EdgeIY/infiniteyield/master/source\'))()', this)">Copy</button>
        </div>
        <div class="glass-panel floating script-card delay-4">
            <h3>wall hop</h3>
            <button class="btn" onclick="copyCode('loadstring(game:HttpGet(\'https://raw.githubusercontent.com/ScpGuest666/Random-Roblox-script/refs/heads/main/Roblox%20WallHop%20V4%20script\'))()', this)">Copy</button>
        </div>
    </div>

    <script>
        // === 緩慢物理延遲游標 (LERP) ===
        const glow = document.getElementById('cursor-glow');
        let mX = window.innerWidth / 2, mY = window.innerHeight / 2;
        let bX = mX, bY = mY;
        const speed = 0.04; // 延遲速度

        window.addEventListener('mousemove', e => { mX = e.clientX; mY = e.clientY; });

        function updateCursor() {
            bX += (mX - bX) * speed;
            bY += (mY - bY) * speed;
            glow.style.left = `${bX}px`;
            glow.style.top = `${bY}px`;
            requestAnimationFrame(updateCursor);
        }
        updateCursor();

        // === 主題切換 ===
        function toggleTheme() {
            const body = document.body;
            const path = document.getElementById('icon-path');
            const isDark = body.getAttribute('data-theme') === 'dark';

            if (isDark) {
                body.setAttribute('data-theme', 'light');
                path.setAttribute('d', 'M12,7c-2.8,0-5,2.2-5,5s2.2,5,5,5s5-2.2,5-5S14.8,7,12,7z M12,2V1M12,23v-1M4.2,4.2L3.5,3.5M20.5,20.5l-0.7-0.7M2,12H1M23,12h-1M4.2,19.8l-0.7,0.7M20.5,3.5l-0.7,0.7');
            } else {
                body.setAttribute('data-theme', 'dark');
                path.setAttribute('d', 'M12.1,22c-4.9,0-9-4.1-9-9s4.1-9,9-9c0.5,0,1,0.1,1.5,0.2c-2,1.2-3.3,3.3-3.3,5.8c0,3.7,3,6.7,6.7,6.7c2.5,0,4.6-1.3,5.8-3.3C22.9,14,23,14.5,23,15C23,19.9,18.9,24,14,24L12.1,22z');
            }
        }

        // === 驗證與複製 ===
        function checkKey() {
            if (document.getElementById('key-input').value === '181818') {
                const login = document.getElementById('login-container');
                const main = document.getElementById('main-container');
                login.style.opacity = '0';
                login.style.transform = 'scale(0.9)';
                setTimeout(() => {
                    login.style.display = 'none';
                    main.style.display = 'flex';
                    setTimeout(() => main.style.opacity = '1', 50);
                }, 600);
            } else {
                alert('Invalid Key!');
            }
        }

        function copyCode(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const original = btn.innerText;
                btn.innerText = 'COPIED!';
                btn.style.background = '#4cd137';
                setTimeout(() => {
                    btn.innerText = original;
                    btn.style.background = 'var(--button-bg)';
                }, 1500);
            });
        }

        // === 粒子系統 ===
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class P {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.s = Math.random() * 2;
                this.vX = Math.random() * 0.4 - 0.2;
                this.vY = Math.random() * 0.4 - 0.2;
            }
            draw() {
                ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text-color');
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.s, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                this.x += this.vX; this.y += this.vY;
                if (this.x < 0 || this.x > canvas.width) this.vX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vY *= -1;
            }
        }
        for (let i = 0; i < 80; i++) particles.push(new P());
        function anim() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(anim);
        }
        anim();
    </script>
</body>
</html>
