<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HVXZ Script Hub - Security Edition</title>
    <style>
        :root {
            /* 默認深色主題 */
            --bg-color: #050505;
            --panel-bg: rgba(15, 15, 15, 0.85);
            --text-color: #ffffff;
            --accent-glow: rgba(0, 255, 204, 0.5);
            --button-bg: #00ffcc;
            --button-text: #000000;
            --cursor-color: rgba(0, 255, 204, 0.2);
            --border-color: rgba(0, 255, 204, 0.3);
            --error-color: #ff4d4d;
        }

        [data-theme="light"] {
            /* 淺色主題 */
            --bg-color: #ffffff;
            --panel-bg: rgba(245, 245, 245, 0.9);
            --text-color: #1a1a1a;
            --accent-glow: rgba(0, 123, 255, 0.4);
            --button-bg: #007bff;
            --button-text: #ffffff;
            --cursor-color: rgba(0, 123, 255, 0.15);
            --border-color: rgba(0, 123, 255, 0.2);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.5s ease;
        }

        /* 物理延遲游標 */
        #cursor-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--cursor-color) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            transform: translate(-50%, -50%);
            will-change: left, top;
        }

        #particles-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.3;
        }

        /* 右上角切換按鈕 */
        #theme-toggle {
            position: fixed;
            top: 25px; right: 25px;
            z-index: 100;
            background: var(--panel-bg);
            border: 2px solid var(--border-color);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px var(--accent-glow);
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #theme-toggle:hover { transform: scale(1.1); }
        .icon { width: 28px; height: 28px; }

        /* 玻璃面板 */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 2px solid var(--border-color);
            border-radius: 35px;
            box-shadow: 0 0 40px var(--accent-glow);
            padding: 60px;
            text-align: center;
            z-index: 10;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .floating { animation: float 6s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        /* 錯誤晃動動畫 */
        .shake {
            animation: shake 0.15s ease-in-out infinite;
            border-color: var(--error-color) !important;
            box-shadow: 0 0 50px var(--error-color) !important;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px); }
            75% { transform: translateX(15px); }
        }

        /* 登入內容控管 */
        #login-content.hidden { display: none; }
        
        #error-display {
            display: none;
            font-size: 8rem;
            color: var(--error-color);
            font-weight: bold;
            line-height: 1;
        }
        #error-display.active { display: block; }

        /* 登入元素樣式 */
        #login-container { width: 450px; }
        h2 { font-size: 2.2rem; margin-bottom: 30px; letter-spacing: 2px; }
        input[type="password"] {
            width: 85%;
            padding: 18px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            border-radius: 15px;
            background: rgba(128, 128, 128, 0.1);
            color: var(--text-color);
            text-align: center;
            font-size: 1.4rem;
            outline: none;
        }
        .btn {
            padding: 15px 50px;
            border: none;
            border-radius: 15px;
            background: var(--button-bg);
            color: var(--button-text);
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 5px 20px var(--accent-glow);
            transition: 0.3s;
        }
        .btn:hover { transform: translateY(-4px); box-shadow: 0 10px 30px var(--accent-glow); }

        /* 主選單排列 */
        #main-container {
            display: none;
            opacity: 0;
            flex-direction: row;
            gap: 30px;
            width: 95%;
            justify-content: center;
        }
        .script-card {
            flex: 1;
            min-width: 280px;
            max-width: 350px;
            height: 260px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .script-card h3 { font-size: 1.6rem; margin-bottom: 35px; }

        /* 延遲動畫 */
        .delay-1 { animation-delay: 0s; }
        .delay-2 { animation-delay: 0.5s; }
        .delay-3 { animation-delay: 1s; }
        .delay-4 { animation-delay: 1.5s; }

    </style>
</head>
<body data-theme="dark">

    <div id="cursor-glow"></div>
    <canvas id="particles-canvas"></canvas>

    <div id="theme-toggle" onclick="toggleTheme()">
        <svg id="icon-moon" class="icon" viewBox="0 0 24 24" style="display: block;">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="var(--text-color)"></path>
        </svg>
        <svg id="icon-sun" class="icon" viewBox="0 0 24 24" style="display: none;">
            <circle cx="12" cy="12" r="5" fill="none" stroke="var(--text-color)" stroke-width="2" stroke-linecap="round"></circle>
            <line x1="12" y1="1" x2="12" y2="3" stroke="var(--text-color)" stroke-width="2" stroke-linecap="round"></line>
            <line x1="12" y1="21" x2="12" y2="23" stroke="var(--text-color)" stroke-width="2" stroke-linecap="round"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" stroke="var(--text-color)" stroke-width="2" stroke-linecap="round"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" stroke="var(--text-color)" stroke-width="2" stroke-linecap="round"></line>
            <line x1="1" y1="12" x2="3" y2="12" stroke="var(--text-color)" stroke-width="2" stroke-linecap="round"></line>
            <line x1="21" y1="12" x2="23" y2="12" stroke="var(--text-color)" stroke-width="2" stroke-linecap="round"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" stroke="var(--text-color)" stroke-width="2" stroke-linecap="round"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" stroke="var(--text-color)" stroke-width="2" stroke-linecap="round"></line>
        </svg>
    </div>

    <div id="login-container" class="glass-panel floating">
        <div id="login-content">
            <h2>ACCESS KEY</h2>
            <input type="password" id="key-input" placeholder="••••••••">
            <br>
            <button class="btn" onclick="checkKey()">VERIFY</button>
        </div>
        <div id="error-display">X</div>
    </div>

    <div id="main-container">
        <div class="glass-panel floating script-card delay-1">
            <h3>voidware</h3>
            <button class="btn" onclick="copyCode('loadstring(game:HttpGet(\'https://raw.githubusercontent.com/VapeVoidware/VW-Add/main/nightsintheforest.lua\', true))()', this)">Copy Code</button>
        </div>
        <div class="glass-panel floating script-card delay-2">
            <h3>rivals</h3>
            <button class="btn" onclick="copyCode('loadstring(game:HttpGet(\'https://raw.githubusercontent.com/akkteste2026-boop/lua/refs/heads/main/NEW%20UPDATE\'))()', this)">Copy Code</button>
        </div>
        <div class="glass-panel floating script-card delay-3">
            <h3>infinite yied 6.4</h3>
            <button class="btn" onclick="copyCode('loadstring(game:HttpGet(\'https://raw.githubusercontent.com/EdgeIY/infiniteyield/master/source\'))()', this)">Copy Code</button>
        </div>
        <div class="glass-panel floating script-card delay-4">
            <h3>wall hop</h3>
            <button class="btn" onclick="copyCode('loadstring(game:HttpGet(\'https://raw.githubusercontent.com/ScpGuest666/Random-Roblox-script/refs/heads/main/Roblox%20WallHop%20V4%20script\'))()', this)">Copy Code</button>
        </div>
    </div>

    <script>
        // === 緩慢物理延遲游標 ===
        const glow = document.getElementById('cursor-glow');
        let mX = window.innerWidth / 2, mY = window.innerHeight / 2;
        let bX = mX, bY = mY;
        const speed = 0.035; // 延遲感係數

        window.addEventListener('mousemove', e => { mX = e.clientX; mY = e.clientY; });

        function updateCursor() {
            bX += (mX - bX) * speed;
            bY += (mY - bY) * speed;
            glow.style.left = `${bX}px`;
            glow.style.top = `${bY}px`;
            requestAnimationFrame(updateCursor);
        }
        updateCursor();

        // === 驗證邏輯與錯誤特效 ===
        function checkKey() {
            const input = document.getElementById('key-input');
            const loginBox = document.getElementById('login-container');
            const loginContent = document.getElementById('login-content');
            const errorDisplay = document.getElementById('error-display');
            const main = document.getElementById('main-container');

            if (input.value === '181818') {
                // 成功：淡出登入視窗
                loginBox.style.opacity = '0';
                loginBox.style.transform = 'scale(0.8)';
                setTimeout(() => {
                    loginBox.style.display = 'none';
                    main.style.display = 'flex';
                    setTimeout(() => main.style.opacity = '1', 50);
                }, 600);
            } else {
                // 失敗：顯示大 X 並左右晃動
                loginContent.classList.add('hidden');
                errorDisplay.classList.add('active');
                loginBox.classList.add('shake');

                // 等搖晃完後恢復
                setTimeout(() => {
                    loginBox.classList.remove('shake');
                    errorDisplay.classList.remove('active');
                    loginContent.classList.remove('hidden');
                    input.value = ''; // 清空輸入
                    input.focus();
                }, 800); // 晃動持續時間
            }
        }

        document.getElementById('key-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkKey();
        });

        // === 穩定的雙圖示切換邏輯 ===
        function toggleTheme() {
            const body = document.body;
            const iconMoon = document.getElementById('icon-moon');
            const iconSun = document.getElementById('icon-sun');
            const isDark = body.getAttribute('data-theme') === 'dark';

            if (isDark) {
                // 切換至淺色
                body.setAttribute('data-theme', 'light');
                iconMoon.style.display = 'none';
                iconSun.style.display = 'block';
            } else {
                // 切換至深色
                body.setAttribute('data-theme', 'dark');
                iconMoon.style.display = 'block';
                iconSun.style.display = 'none';
            }
        }

        // === 複製功能 ===
        function copyCode(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const original = btn.innerText;
                btn.innerText = 'COPIED';
                btn.style.background = '#4cd137';
                setTimeout(() => {
                    btn.innerText = original;
                    btn.style.background = 'var(--button-bg)';
                }, 1500);
            });
        }

        // === 粒子背景 ===
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        class P {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.s = Math.random() * 2;
                this.vX = Math.random() * 0.5 - 0.25;
                this.vY = Math.random() * 0.5 - 0.25;
            }
            draw() {
                ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text-color');
                ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, Math.PI * 2); ctx.fill();
            }
            update() {
                this.x += this.vX; this.y += this.vY;
                if (this.x < 0 || this.x > canvas.width) this.vX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vY *= -1;
            }
        }
        for (let i = 0; i < 80; i++) particles.push(new P());
        function anim() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(anim);
        }
        anim();
    </script>
</body>
</html>
