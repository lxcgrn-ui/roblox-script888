<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HVXZ Script Hub - Advanced Edition</title>
    <style>
        :root {
            /* Dark Theme Variables (Now Default) */
            --bg-color: #050505;
            --panel-bg: rgba(20, 20, 20, 0.7);
            --text-color: #ffffff;
            --accent-glow: rgba(0, 255, 204, 0.6);
            --button-bg: #00ffcc;
            --button-text: #000000;
            --cursor-glow-color: rgba(0, 255, 204, 0.3);
            --border-color: rgba(0, 255, 204, 0.2);
        }

        [data-theme="light"] {
            /* Light Theme Variables */
            --bg-color: #f8f9fa;
            --panel-bg: rgba(255, 255, 255, 0.75);
            --text-color: #1a1a1a;
            --accent-glow: rgba(0, 123, 255, 0.5);
            --button-bg: #007bff;
            --button-text: #ffffff;
            --cursor-glow-color: rgba(0, 123, 255, 0.2);
            --border-color: rgba(0, 123, 255, 0.2);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.8s ease;
        }

        /* 延遲游標跟隨發光體 */
        #cursor-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--cursor-glow-color) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            /* 初始位置 */
            left: 0;
            top: 0;
            transform: translate(-50%, -50%);
            will-change: left, top; /* 優化效能 */
        }

        /* 粒子背景 */
        #particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.4;
        }

        /* 右上角切換按鈕 */
        #theme-toggle {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 100;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 12px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px var(--accent-glow);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
        }

        #theme-toggle:hover {
            transform: rotate(30deg) scale(1.1);
        }

        .icon {
            width: 26px;
            height: 26px;
            fill: var(--text-color);
        }

        /* 玻璃面板 */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-color);
            border-radius: 35px;
            box-shadow: 0 0 40px var(--accent-glow);
            padding: 60px;
            text-align: center;
            z-index: 10;
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        /* 緩慢浮動動畫 */
        .floating {
            animation: slowFloat 7s ease-in-out infinite;
        }

        @keyframes slowFloat {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-25px) rotate(1.5deg); }
        }

        /* 登入視窗 */
        #login-container {
            width: 480px;
        }

        #login-container h2 {
            margin-bottom: 35px;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 0 0 15px var(--accent-glow);
        }

        input[type="password"] {
            width: 85%;
            padding: 18px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            border-radius: 15px;
            background: rgba(127, 127, 127, 0.05);
            color: var(--text-color);
            text-align: center;
            font-size: 1.3rem;
            outline: none;
            transition: border 0.3s;
        }

        input[type="password"]:focus {
            border-color: var(--button-bg);
        }

        .action-btn {
            padding: 15px 45px;
            border: none;
            border-radius: 15px;
            background: var(--button-bg);
            color: var(--button-text);
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 0 20px var(--accent-glow);
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 35px var(--accent-glow);
        }

        /* 腳本視窗排成一列 */
        #main-container {
            display: none;
            opacity: 0;
            flex-direction: row;
            gap: 35px;
            width: 95%;
            justify-content: center;
        }

        .script-card {
            flex: 1;
            min-width: 280px;
            max-width: 380px;
            height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .script-card h3 {
            font-size: 1.8rem;
            margin-bottom: 40px;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        /* 動畫延遲 */
        .delay-1 { animation-delay: 0s; }
        .delay-2 { animation-delay: 0.6s; }
        .delay-3 { animation-delay: 1.2s; }
        .delay-4 { animation-delay: 1.8s; }

    </style>
</head>
<body data-theme="dark">

    <div id="cursor-glow"></div>
    <canvas id="particles-canvas"></canvas>

    <div id="theme-toggle" onclick="toggleTheme()">
        <svg id="theme-icon" class="icon" viewBox="0 0 24 24">
            <path id="icon-path" d="M12,3c-4.97,0-9,4.03-9,9s4.03,9,9,9s9-4.03,9-9c0-0.46-0.04-0.92-0.1-1.36c-0.98,1.37-2.58,2.26-4.4,2.26 c-2.98,0-5.4-2.42-5.4-5.4c0-1.81,0.89-3.42,2.26-4.4C12.92,3.04,12.46,3,12,3L12,3z"/>
        </svg>
    </div>

    <div id="login-container" class="glass-panel floating">
        <h2>Enter Key</h2>
        <input type="password" id="key-input" placeholder="••••••••">
        <br>
        <button class="action-btn" onclick="checkKey()">Unlock System</button>
    </div>

    <div id="main-container">
        <div class="glass-panel floating script-card delay-1">
            <h3>voidware</h3>
            <button class="action-btn" onclick="copyScript('loadstring(game:HttpGet(\'https://raw.githubusercontent.com/VapeVoidware/VW-Add/main/nightsintheforest.lua\', true))()', this)">Copy</button>
        </div>
        <div class="glass-panel floating script-card delay-2">
            <h3>rivals</h3>
            <button class="action-btn" onclick="copyScript('loadstring(game:HttpGet(\'https://raw.githubusercontent.com/akkteste2026-boop/lua/refs/heads/main/NEW%20UPDATE\'))()', this)">Copy</button>
        </div>
        <div class="glass-panel floating script-card delay-3">
            <h3>infinite yied 6.4</h3>
            <button class="action-btn" onclick="copyScript('loadstring(game:HttpGet(\'https://raw.githubusercontent.com/EdgeIY/infiniteyield/master/source\'))()', this)">Copy</button>
        </div>
        <div class="glass-panel floating script-card delay-4">
            <h3>wall hop</h3>
            <button class="action-btn" onclick="copyScript('loadstring(game:HttpGet(\'https://raw.githubusercontent.com/ScpGuest666/Random-Roblox-script/refs/heads/main/Roblox%20WallHop%20V4%20script\'))()', this)">Copy</button>
        </div>
    </div>

    <script>
        // === 物理延遲游標邏輯 (LERP) ===
        const glow = document.getElementById('cursor-glow');
        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let ballX = window.innerWidth / 2;
        let ballY = window.innerHeight / 2;
        
        // 延遲係數：數字越小越慢，延遲感越強 (0.03 = 非常緩慢)
        const speed = 0.03; 

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateCursor() {
            // 線性插值計算
            let distX = mouseX - ballX;
            let distY = mouseY - ballY;
            
            ballX = ballX + (distX * speed);
            ballY = ballY + (distY * speed);
            
            glow.style.left = ballX + 'px';
            glow.style.top = ballY + 'px';
            
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // === 主題切換邏輯 ===
        function toggleTheme() {
            const body = document.body;
            const iconPath = document.getElementById('icon-path');
            const currentTheme = body.getAttribute('data-theme');
            
            if (currentTheme === 'dark') {
                body.setAttribute('data-theme', 'light');
                // Switch to Sun Icon
                iconPath.setAttribute('d', 'M12,7c-2.76,0-5,2.24-5,5s2.24,5,5,5s5-2.24,5-5S14.76,7,12,7L12,7z M2,13l2,0c0.55,0,1-0.45,1-1s-0.45-1-1-1l-2,0 c-0.55,0-1,0.45-1,1S1.45,13,2,13L2,13z M20,13l2,0c0.55,0,1-0.45,1-1s-0.45-1-1-1l-2,0c-0.55,0-1,0.45-1,1S19.45,13,20,13L20,13z M11,2v2c0,0.55,0.45,1,1,1s1-0.45,1-1V2c0-0.55-0.45-1-1-1S11,1.45,11,2L11,2z M11,20v2c0,0.55,0.45,1,1,1s1-0.45,1-1v-2 c0-0.55-0.45-1-1-1S11,19.45,11,20L11,20z M5.99,4.58c-0.39-0.39-1.03-0.39-1.41,0c-0.39,0.39-0.39,1.03,0,1.41l1.06,1.06 c0.39,0.39,1.03,0.39,1.41,0s0.39-1.03,0-1.41L5.99,4.58L5.99,4.58z M18.36,16.95c-0.39-0.39-1.03-0.39-1.41,0 c-0.39,0.39-0.39,1.03,0,1.41l1.06,1.06c0.39,0.39,1.03,0.39,1.41,0c0.39-0.39,0.39-1.03,0-1.41L18.36,16.95L18.36,16.95z M5.99,19.42l-1.06,1.06c-0.39,0.39-0.39,1.03,0,1.41c0.39,0.39,1.03,0.39,1.41,0l1.06-1.06c0.39-0.39,0.39-1.03,0-1.41 C7.02,19.03,6.38,19.03,5.99,19.42L5.99,19.42z M18.36,7.05l1.06-1.06c0.39-0.39,0.39-1.03,0-1.41c-0.39-0.39-1.03-0.39-1.41,0 l-1.06,1.06c-0.39,0.39-0.39,1.03,0,1.41C17.33,7.44,17.97,7.44,18.36,7.05L18.36,7.05z');
            } else {
                body.setAttribute('data-theme', 'dark');
                // Switch to Moon Icon
                iconPath.setAttribute('d', 'M12,3c-4.97,0-9,4.03-9,9s4.03,9,9,9s9-4.03,9-9c0-0.46-0.04-0.92-0.1-1.36c-0.98,1.37-2.58,2.26-4.4,2.26 c-2.98,0-5.4-2.42-5.4-5.4c0-1.81,0.89-3.42,2.26-4.4C12.92,3.04,12.46,3,12,3L12,3z');
            }
        }

        // === Key 驗證 ===
        function checkKey() {
            const val = document.getElementById('key-input').value;
            const login = document.getElementById('login-container');
            const main = document.getElementById('main-container');

            if (val === '181818') {
                login.style.opacity = '0';
                login.style.transform = 'scale(0.7) translateY(50px)';
                setTimeout(() => {
                    login.style.display = 'none';
                    main.style.display = 'flex';
                    setTimeout(() => { main.style.opacity = '1'; }, 50);
                }, 800);
            } else {
                alert('Access Denied: Incorrect License Key');
            }
        }

        document.getElementById('key-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkKey();
        });

        // === 複製功能 ===
        function copyScript(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const oldText = btn.innerText;
                btn.innerText = 'COPIED!';
                btn.style.background = '#ffffff';
                btn.style.color = '#000000';
                setTimeout(() => {
                    btn.innerText = oldText;
                    btn.style.background = 'var(--button-bg)';
                    btn.style.color = 'var(--button-text)';
                }, 2000);
            });
        }

        // === 粒子背景 ===
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.3 - 0.15;
                this.speedY = Math.random() * 0.3 - 0.15;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
                if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
            }
            draw() {
                ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text-color');
                ctx.globalAlpha = 0.15;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < 60; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        init();
        animate();
    </script>
</body>
</html>
